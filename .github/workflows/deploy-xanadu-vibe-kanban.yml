name: deploy-xanadu-vibe-kanban

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vibe-kanban-xanadu-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Vibe Kanban to xanadu-host
    environment:
      name: xanadu-production
      url: https://vibe.yxanadu.com
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - vibe-kanban-deploy
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Deploy to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_DEPLOY_SHA: ${{ github.sha }}
          VIBE_KANBAN_LIVE_REPO: /workspace/projects/vibe-kanban
          VIBE_KANBAN_VERIFY_PUBLIC: "0"
        run: |
          set -euo pipefail
          cd "$VIBE_KANBAN_LIVE_REPO"
          git fetch origin main
          git checkout -B main "$GITHUB_DEPLOY_SHA"
          chmod +x scripts/deploy-xanadu-vibe-kanban.sh
          ./scripts/deploy-xanadu-vibe-kanban.sh

      - name: Verify public deployment
        run: |
          set -euo pipefail
          for url in \
            http://127.0.0.1:8080/api/info \
            http://127.0.0.1:8082/api/info
          do
            echo "checking $url"
            code=$(curl -k -sS -o /tmp/vibe-kanban-check -w '%{http_code}' "$url")
            echo "code=$code"
            test "$code" = "200"
            head -c 300 /tmp/vibe-kanban-check || true
            echo
            echo
          done
