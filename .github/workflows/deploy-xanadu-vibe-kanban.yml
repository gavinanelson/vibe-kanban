name: deploy-xanadu-vibe-kanban

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vibe-kanban-xanadu-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Vibe Kanban to xanadu-host
    environment:
      name: xanadu-production
      url: https://vibe.yxanadu.com
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - xanadu-host
      - vibe-kanban-deploy
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Deploy to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/deploy-xanadu-vibe-kanban.sh
          ./scripts/deploy-xanadu-vibe-kanban.sh

      - name: Verify public deployment
        run: |
          set -euo pipefail
          for url in \
            http://127.0.0.1:3063/health \
            https://vibe.yxanadu.com/health
          do
            echo "checking $url"
            code=$(curl -k -sS -o /tmp/vibe-kanban-check -w '%{http_code}' "$url")
            echo "code=$code"
            test "$code" = "200"
            head -c 300 /tmp/vibe-kanban-check || true
            echo
            echo
          done
